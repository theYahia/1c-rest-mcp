name: 1c-rest-mcp
description: MCP server for 1C:Enterprise REST API — catalogs, documents, registers, reports via OData 3.0
icon: https://raw.githubusercontent.com/theYahia/1c-rest-mcp/main/icon.png
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - ONEC_BASE_URL
      - ONEC_LOGIN
      - ONEC_PASSWORD
    properties:
      ONEC_BASE_URL:
        type: string
        description: "Base URL of 1C server (e.g. http://server:8080/base)"
      ONEC_LOGIN:
        type: string
        description: "1C login for HTTP Basic Auth"
      ONEC_PASSWORD:
        type: string
        description: "1C password for HTTP Basic Auth"
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@theyahia/1c-rest-mcp"],
      env: {
        ONEC_BASE_URL: config.ONEC_BASE_URL,
        ONEC_LOGIN: config.ONEC_LOGIN,
        ONEC_PASSWORD: config.ONEC_PASSWORD,
      }
    })
